<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Gestor Financeiro Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .premium-card {
            background: #ffffff;
            box-shadow: 0 10px 30px -5px rgba(0,0,0,0.05);
            border: 1px solid rgba(226, 232, 240, 0.6);
            border-radius: 1.5rem;
        }

        .timeline-container::before {
            content: '';
            position: absolute;
            top: 0; left: 1.5rem; height: 100%; width: 3px;
            background: linear-gradient(180deg, #6366f1 0%, #0ea5e9 50%, transparent 100%);
            border-radius: 3px;
        }
        
        .input-elegant { transition: all 0.3s ease; }
        .input-elegant:focus { transform: translateY(-2px); box-shadow: 0 10px 20px -10px rgba(99, 102, 241, 0.4); }
        .tag-whatsapp { background: rgba(16, 185, 129, 0.1); color: #059669; border: 1px solid rgba(16, 185, 129, 0.2); }
        .tag-pix { background: rgba(99, 102, 241, 0.1); color: #4f46e5; border: 1px solid rgba(99, 102, 241, 0.2); }
        .tag-cartao { background: rgba(245, 158, 11, 0.1); color: #d97706; border: 1px solid rgba(245, 158, 11, 0.2); }
        .tag-lucro { background: rgba(16, 185, 129, 0.1); color: #059669; border: 1px solid rgba(16, 185, 129, 0.2); }
        
        .btn-sync { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(99, 102, 241, 0); }
            100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }

        .hover-item:hover .delete-btn, .hover-item:hover .edit-btn { opacity: 1; }
        .delete-btn, .edit-btn { opacity: 0; transition: opacity 0.2s; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.8); z-index: 9999; display: flex; justify-content: center; items: center; flex-direction: column; color: white; backdrop-filter: blur(5px); }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #6366f1; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

<body class="bg-slate-50 text-slate-800 h-screen w-screen overflow-hidden flex flex-col">

    <div id="loader-screen" class="loading-overlay hidden">
        <div class="loader mb-4"></div>
        <p class="font-bold text-sm tracking-widest uppercase text-indigo-200">Sincronizando Banco de Dados...</p>
    </div>

    <!-- MAIN APP STRUCTURE -->
    <div id="main-app" class="h-full w-full flex flex-col bg-slate-50 relative pb-[80px]">

        <header id="app-header" class="bg-slate-900 text-white pt-12 pb-8 px-6 rounded-b-[3rem] shadow-xl shrink-0 relative overflow-hidden z-20 transition-colors duration-500">
            <div class="flex justify-between items-center relative z-10 mb-6">
                <div class="flex items-center gap-4">
                    <div id="avatar-border" class="w-14 h-14 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 p-1 shadow-lg border-2 border-slate-800">
                        <img src="https://ui-avatars.com/api/?name=Jondson+Rabelo&background=random&color=fff&bold=true" class="w-full h-full rounded-full border border-slate-900" alt="Perfil">
                    </div>
                    <div>
                        <h2 class="text-xl font-black tracking-wide">Jondson Rabelo</h2>
                        <div class="mt-1">
                            <select id="profile-selector" class="bg-black/20 border border-white/10 rounded-xl px-3 py-1.5 text-xs font-black text-white outline-none focus:ring-2 focus:ring-white">
                                <option value="jrkingdom">💎 JR Kingdom</option>
                                <option value="pessoal">👤 Jondson Pessoal</option>
                                <option value="daiane">👸 Daiane Rabelo</option>
                                <option value="consolidado">👨👩👧👦 Visão Familiar</option>
                            </select>
                        </div>
                    </div>
                </div>
                <button onclick="carregarDadosDoServidor()" class="btn-sync bg-indigo-600 hover:bg-indigo-500 text-white w-10 h-10 rounded-xl flex items-center justify-center transition-all active:scale-90 shadow-lg">
                    <i class="fas fa-sync-alt text-sm"></i>
                </button>
            </div>

            <div class="relative z-10 flex justify-between items-end">
                <div>
                    <p class="text-[11px] text-white/70 uppercase tracking-[0.2em] font-bold mb-1" id="header-subtitle">Saldo Líquido ($)</p>
                    <div class="flex items-center gap-3">
                        <h1 class="text-5xl font-black tracking-tighter" id="header-saldo">$ 0.00</h1>
                        <button onclick="toggleSaldoVisivel()" class="text-white/60 bg-black/20 w-8 h-8 rounded-full flex items-center justify-center hover:text-white">
                            <i id="icone-olho-saldo" class="fas fa-eye-slash text-xs"></i>
                        </button>
                    </div>
                </div>
                <select id="filtro-periodo" onchange="atualizarInterface()" class="bg-black/30 border border-white/20 text-white text-xs font-bold rounded-lg px-2 py-1 outline-none">
                    <option value="tudo">Todo o Período</option>
                    <option value="mes_atual">Mês Atual</option>
                </select>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto no-scrollbar relative z-10 -mt-6">
            <div id="view-dashboard" class="px-6 pt-10 pb-24 space-y-6 fade-in">
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="premium-card p-5 relative">
                        <div class="w-10 h-10 bg-emerald-100 text-emerald-600 rounded-xl flex items-center justify-center mb-3"><i class="fas fa-arrow-down"></i></div>
                        <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest">Receitas</p>
                        <p class="text-2xl font-black text-slate-800 mt-1" id="card-entradas">$ 0.00</p>
                    </div>
                    <div class="premium-card p-5 relative">
                        <div class="w-10 h-10 bg-rose-100 text-rose-600 rounded-xl flex items-center justify-center mb-3"><i class="fas fa-arrow-up"></i></div>
                        <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest">Despesas</p>
                        <p class="text-2xl font-black text-slate-800 mt-1" id="card-saidas">$ 0.00</p>
                    </div>
                </div>

                <div id="cards-familiares" class="hidden grid grid-cols-3 gap-2">
                    <div class="bg-indigo-50 p-3 rounded-xl">
                        <p class="text-[8px] font-black text-indigo-600 uppercase">Jondson</p>
                        <p class="text-sm font-black text-slate-800" id="resumo-jondson">$ 0</p>
                    </div>
                    <div class="bg-pink-50 p-3 rounded-xl">
                        <p class="text-[8px] font-black text-pink-600 uppercase">Daiane</p>
                        <p class="text-sm font-black text-slate-800" id="resumo-daiane">$ 0</p>
                    </div>
                    <div class="bg-purple-50 p-3 rounded-xl">
                        <p class="text-[8px] font-black text-purple-600 uppercase">JR Kingdom</p>
                        <p class="text-sm font-black text-slate-800" id="resumo-jr">$ 0</p>
                    </div>
                </div>

                <div id="bloco-insights" class="premium-card p-6"></div>

                <!-- Resumo de Parcelamentos Pendentes -->
                <div id="resumo-parcelamentos" class="premium-card p-6 hidden">
                    <h3 class="text-sm font-black text-slate-800 mb-4 uppercase tracking-wide">
                        <i class="fas fa-tasks text-emerald-500 mr-2"></i> Recebimentos Pendentes
                    </h3>
                    <div id="lista-parcelamentos" class="space-y-3"></div>
                </div>

                <!-- Resumo de Vendas JR Kingdom -->
                <div id="resumo-vendas" class="premium-card p-6 hidden">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-sm font-black text-slate-800"><i class="fas fa-gem text-indigo-500 mr-2"></i> Relatório de Vendas</h3>
                        <button onclick="abrirModalVenda()" class="bg-indigo-600 text-white px-3 py-1.5 rounded-xl text-xs font-black">
                            <i class="fas fa-plus mr-1"></i> Nova
                        </button>
                    </div>
                    <div id="lista-vendas" class="space-y-3"></div>
                </div>
            </div>

            <div id="view-extrato" class="hidden px-6 pt-10 pb-24 fade-in">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-black text-slate-800">Extrato</h2>
                    <button onclick="abrirModalTransacao()" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-xs font-black">
                        <i class="fas fa-plus mr-1"></i> Nova
                    </button>
                </div>
                <div id="lista-extrato" class="space-y-3"></div>
            </div>

            <div id="view-agenda" class="hidden px-6 pt-10 pb-24 fade-in">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-black text-slate-800 leading-none">Agenda</h2>
                    <button onclick="abrirModalAgenda()" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-xs font-black">
                        <i class="fas fa-plus mr-1"></i> Novo
                    </button>
                </div>
                <div class="relative timeline-container pl-10 space-y-6" id="lista-agenda"></div>
            </div>
        </div>

        <!-- NAVBAR INFERIOR -->
        <nav class="fixed bottom-0 w-full bg-white/95 backdrop-blur-md border-t border-slate-200 z-30 pb-safe">
            <div class="flex justify-around items-center h-20 px-2 max-w-md mx-auto relative">
                <button onclick="mudarAba('dashboard')" id="tab-dashboard" class="flex flex-col items-center gap-1.5 text-indigo-600 p-2 w-16">
                    <i class="fas fa-chart-pie text-xl"></i><span class="text-[10px] font-bold">Resumo</span>
                </button>
                <button onclick="mudarAba('extrato')" id="tab-extrato" class="flex flex-col items-center gap-1.5 text-slate-400 p-2 w-16">
                    <i class="fas fa-list text-xl"></i><span class="text-[10px] font-bold">Extrato</span>
                </button>
                
                <div class="relative -top-6">
                    <button onclick="handlePlusButton()" id="plus-button" class="w-16 h-16 bg-gradient-to-tr from-indigo-600 to-purple-600 rounded-full flex items-center justify-center text-white border-4 border-slate-50 shadow-lg transform hover:scale-105">
                        <i class="fas fa-plus text-2xl" id="icone-plus"></i>
                    </button>
                </div>

                <button onclick="mudarAba('agenda')" id="tab-agenda" class="flex flex-col items-center gap-1.5 text-slate-400 p-2 w-16">
                    <i class="fas fa-calendar-day text-xl"></i><span class="text-[10px] font-bold">Agenda</span>
                </button>
                <button onclick="sincronizarJSON()" class="flex flex-col items-center gap-1.5 text-slate-400 p-2 w-16">
                    <i class="fas fa-download text-xl"></i><span class="text-[10px] font-bold">Backup</span>
                </button>
            </div>
        </nav>
    </div>

    <!-- Modais de Formulário serão injetados via script (app.js) para limpar o HTML. -->
    <div id="modals-container"></div>
    <!-- Toast Notification -->
    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-2xl text-sm font-bold shadow-2xl z-[100] hidden transition-all duration-300 flex items-center gap-2">
        <i class="fas fa-check-circle text-emerald-400"></i>
        <span id="toast-message"></span>
    </div>

    <script src="app.js"></script>
</body>
</html>
