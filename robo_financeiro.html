<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Gestor Financeiro Premium - JARVIS 4.1</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    .slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }

    .premium-card {
      background: #ffffff;
      box-shadow: 0 10px 30px -5px rgba(0,0,0,0.05);
      border: 1px solid rgba(226, 232, 240, 0.6);
      border-radius: 1.5rem;
    }
  </style>
</head>

<body class="bg-slate-50 text-slate-800 h-screen w-screen overflow-hidden flex flex-col selection:bg-indigo-500 selection:text-white">

  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="absolute inset-0 z-[100] flex items-center justify-center bg-slate-900 fade-in bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1614028674026-a65e31bfd27c?q=80&w=2070&auto=format&fit=crop');">
    <div class="absolute inset-0 bg-slate-900/75 backdrop-blur-sm"></div>
    <div class="w-full max-w-sm px-6 relative z-10">
      <div class="glass-card p-8 rounded-[2.5rem]">
        <div class="text-center mb-8">
          <div class="mx-auto w-20 h-20 bg-gradient-to-tr from-indigo-500 to-purple-600 rounded-full flex items-center justify-center shadow-[0_0_30px_rgba(99,102,241,0.5)] mb-5 border border-white/20">
            <i class="fas fa-chart-line text-3xl text-white"></i>
          </div>
          <h1 class="text-2xl font-black text-white tracking-tight leading-tight">Robô<br>Financeiro</h1>
          <p class="text-indigo-200 text-xs mt-2 font-bold tracking-[0.2em] uppercase">JR Kingdom Sócio</p>
        </div>
        <form id="form-login" class="space-y-5">
            <input type="email" id="login-user" value="jondson@rabelo.com" class="w-full px-6 py-4 bg-slate-800/50 border border-slate-600/50 rounded-2xl text-white outline-none">
            <input type="password" id="login-pass" value="123456" class="w-full px-6 py-4 bg-slate-800/50 border border-slate-600/50 rounded-2xl text-white outline-none">
          <button type="submit" class="w-full bg-white text-slate-900 py-4 rounded-2xl text-sm font-black active:scale-95 transition">Acessar JARVIS</button>
        </form>
      </div>
    </div>
  </div>

  <div id="main-app" class="hidden h-full w-full flex-col bg-slate-50 relative pb-[80px]">
    <header class="bg-slate-900 text-white pt-12 pb-8 px-6 rounded-b-[3rem] shadow-xl shrink-0 z-20">
      <div class="flex justify-between items-center mb-8">
        <h2 class="text-xl font-black">💎 JR Kingdom</h2>
        <button onclick="fetchVendas()" class="bg-indigo-600 w-10 h-10 rounded-xl flex items-center justify-center"><i class="fas fa-sync-alt"></i></button>
      </div>
      <div class="relative">
        <p class="text-[11px] text-white/70 uppercase font-bold mb-1">Patrimônio Líquido Real (Pós-Dízimo)</p>
        <h1 class="text-5xl font-black tracking-tighter" id="header-saldo">$ 0.00</h1>
      </div>
    </header>

    <div class="flex-1 overflow-y-auto no-scrollbar -mt-6 px-6 pt-10 pb-24 space-y-6">
      <div class="grid grid-cols-2 gap-4">
          <div class="premium-card p-5">
            <p class="text-[10px] text-slate-400 font-black uppercase">Lucro Bruto</p>
            <p class="text-2xl font-black text-slate-800 mt-1" id="card-bruto">$ 0.00</p>
          </div>
          <div class="premium-card p-5">
            <p class="text-[10px] text-rose-400 font-black uppercase">Dízimo (10%)</p>
            <p class="text-2xl font-black text-rose-600 mt-1" id="card-dizimo">$ 0.00</p>
          </div>
      </div>

      <!-- Pequeno Gráfico de Barras -->
      <div class="premium-card p-6 h-40 relative">
          <canvas id="graficoMini"></canvas>
      </div>

      <div id="lista-vendas" class="space-y-3"></div>
    </div>

    <nav class="fixed bottom-0 w-full bg-white/95 backdrop-blur-md border-t border-slate-200 z-30 h-20 flex justify-around items-center">
        <button onclick="fetchVendas()" class="text-indigo-600 flex flex-col items-center"><i class="fas fa-chart-pie"></i><span class="text-[10px] font-bold">Dashboard</span></button>
        <button onclick="abrirModalVenda()" class="w-16 h-16 bg-indigo-600 rounded-full flex items-center justify-center text-white shadow-lg -top-6 relative border-4 border-slate-50"><i class="fas fa-plus"></i></button>
        <button class="text-slate-400 flex flex-col items-center"><i class="fas fa-list"></i><span class="text-[10px] font-bold">Histórico</span></button>
    </nav>

    <!-- Modal Venda Detalhada -->
    <div id="modal-venda" class="fixed inset-0 z-50 hidden">
      <div class="absolute inset-0 bg-slate-900/70 backdrop-blur-sm" onclick="fecharModalVenda()"></div>
      <div class="absolute bottom-0 w-full bg-white rounded-t-[2.5rem] p-7 slide-up">
        <h2 class="text-2xl font-black text-slate-800 mb-6" id="venda-modal-titulo">💎 Nova Venda</h2>
        <form id="form-venda" class="space-y-4">
          <input type="text" id="venda-cliente" class="w-full py-4 bg-slate-50 border rounded-2xl px-4 outline-none" placeholder="Nome do Cliente" required>
          <input type="text" id="venda-produto" class="w-full py-4 bg-slate-50 border rounded-2xl px-4 outline-none" placeholder="Peça / Produto" required>
          <div class="grid grid-cols-2 gap-3">
            <input type="number" step="0.01" id="venda-valor" class="w-full py-4 bg-slate-50 border rounded-2xl px-4 outline-none" placeholder="Preço ($)" required>
            <input type="number" step="0.01" id="venda-custo" class="w-full py-4 bg-slate-50 border rounded-2xl px-4 outline-none" placeholder="Custo ($)" required>
          </div>
          <input type="number" step="0.01" id="venda-pendente" class="w-full py-4 bg-slate-50 border rounded-2xl px-4 outline-none" placeholder="Em Aberto ($)" value="0">
          <div class="flex gap-3 mt-4">
            <button type="button" onclick="fecharModalVenda()" class="flex-1 bg-slate-200 py-4 rounded-xl font-bold">Sair</button>
            <button type="submit" class="flex-1 bg-indigo-600 text-white py-4 rounded-xl font-bold">Confirmar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:3000/api';
    let editModeID = null;
    let allVendas = [];
    let chartInstance = null;

    function formatDollar(val) { return `$ ${Number(val).toLocaleString('en-US', {minimumFractionDigits: 2})}`; }

    async function fetchVendas() {
        try {
            const res = await fetch(`${API_URL}/vendas`);
            allVendas = await res.json();
            renderVendas(allVendas);
            updateChart(allVendas);
        } catch (e) { console.error("API Offline"); }
    }

    function renderVendas(vendas) {
        const container = document.getElementById('lista-vendas');
        container.innerHTML = '';
        let totalBruto = 0, totalDizimo = 0, totalLiquido = 0;

        vendas.forEach(v => {
            totalBruto += v.lucroBruto;
            totalDizimo += v.dizimo;
            totalLiquido += v.lucroLiquido;

            container.insertAdjacentHTML('beforeend', `
                <div class="premium-card p-5 border-l-4 border-indigo-500 relative group">
                    <div class="absolute right-4 top-4 flex gap-4 opacity-0 group-hover:opacity-100 transition">
                        <button onclick="prepararEdicao('${v.id}')" class="text-indigo-400 hover:text-indigo-600"><i class="fas fa-edit"></i></button>
                        <button onclick="excluirVenda('${v.id}')" class="text-rose-400 hover:text-rose-600"><i class="fas fa-trash"></i></button>
                    </div>
                    <div class="flex justify-between mb-1">
                        <h4 class="font-black text-slate-800">${v.nomeCliente}</h4>
                        <span class="text-[9px] ${v.status === 'Pago' ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600'} px-2 py-1 rounded font-black uppercase">${v.status}</span>
                    </div>
                    <p class="text-xs text-slate-500 font-bold mb-3">${v.nomePeca}</p>
                    <div class="flex justify-between items-end">
                        <div>
                            <p class="text-[9px] text-slate-400 font-black uppercase">Lucro Líquido</p>
                            <p class="text-lg font-black text-emerald-600">${formatDollar(v.lucroLiquido)}</p>
                        </div>
                        <div class="text-right">
                             <p class="text-[9px] text-rose-400 font-black uppercase">Dízimo (10%)</p>
                             <p class="text-xs font-black text-rose-500">${formatDollar(v.dizimo)}</p>
                        </div>
                    </div>
                </div>
            `);
        });

        document.getElementById('header-saldo').innerText = formatDollar(totalLiquido);
        document.getElementById('card-bruto').innerText = formatDollar(totalBruto);
        document.getElementById('card-dizimo').innerText = formatDollar(totalDizimo);
    }

    async function excluirVenda(id) {
        if(!confirm("Excluir venda?")) return;
        await fetch(`${API_URL}/vendas/${id}`, { method: 'DELETE' });
        fetchVendas();
    }

    function prepararEdicao(id) {
        const v = allVendas.find(x => x.id === id);
        if(!v) return;
        editModeID = id;
        document.getElementById('venda-modal-titulo').innerText = "💎 Editar Venda";
        document.getElementById('venda-cliente').value = v.nomeCliente;
        document.getElementById('venda-produto').value = v.nomePeca;
        document.getElementById('venda-valor').value = v.valor;
        document.getElementById('venda-custo').value = v.custo;
        document.getElementById('venda-pendente').value = v.pendente;
        abrirModalVenda();
    }

    document.getElementById('form-venda').addEventListener('submit', async (e) => {
        e.preventDefault();
        const payload = {
            nomeCliente: document.getElementById('venda-cliente').value,
            produto: "Venda Loja",
            nomePeca: document.getElementById('venda-produto').value,
            valor: parseFloat(document.getElementById('venda-valor').value),
            custo: parseFloat(document.getElementById('venda-custo').value),
            pendente: parseFloat(document.getElementById('venda-pendente').value),
            data: new Date().toLocaleDateString('pt-BR')
        };
        
        const method = editModeID ? 'PUT' : 'POST';
        const url = editModeID ? `${API_URL}/vendas/${editModeID}` : `${API_URL}/vendas`;

        await fetch(url, {
            method: method,
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        
        editModeID = null;
        document.getElementById('venda-modal-titulo').innerText = "💎 Nova Venda";
        e.target.reset();
        fecharModalVenda();
        fetchVendas();
    });

    function updateChart(vendas) {
        const ctx = document.getElementById('graficoMini').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        
        const last5 = vendas.slice(-5);
        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: last5.map(v => v.nomeCliente),
                datasets: [{
                    label: 'Lucro Líquido ($)',
                    data: last5.map(v => v.lucroLiquido),
                    backgroundColor: '#6366f1',
                    borderRadius: 5
                }]
            },
            options: { maintainAspectRatio: false, scales: { y: { display: false }, x: { grid: { display: false } } }, plugins: { legend: { display: false } } }
        });
    }

    document.getElementById('form-login').addEventListener('submit', (e) => {
        e.preventDefault();
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById('main-app').classList.add('flex');
        fetchVendas();
    });

    function abrirModalVenda() { document.getElementById('modal-venda').classList.remove('hidden'); }
    function fecharModalVenda() { document.getElementById('modal-venda').classList.add('hidden'); editModeID = null; document.getElementById('venda-modal-titulo').innerText = "💎 Nova Venda"; }
  </script>
</body>
</html>
